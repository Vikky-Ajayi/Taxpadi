kind = "web"
previewPath = "/"
title = "TaxPay"
version = "1.0.0"
id = "artifacts/taxpay"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18753

[services.development]
run = "pnpm --filter @workspace/taxpay run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/taxpay", "run", "build" ]
serve = "static"
publicDir = "artifacts/taxpay/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18753"
BASE_PATH = "/"
